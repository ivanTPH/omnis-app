name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      deployment_uuid: ${{ steps.trigger.outputs.deployment_uuid || '' }}

    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -s -X GET \
            "http://165.232.96.51:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Wait for new container + warm all auth paths
        # Docker build (3-stage) takes ~6-8 min. Wait 7 min for the build, then:
        # 1. Poll auth endpoint until the NEW container responds (not the old one).
        # 2. Warm ALL 9 role auth paths + the /login SSR page so that Playwright's
        #    global-setup doesn't hit cold Next.js SSR + cold bcrypt + cold DB on
        #    first login (which caused 90s timeouts for every role in global-setup).
        run: |
          BASE=https://omnis.education
          echo "Waiting 7 minutes for Docker build + deploy + container start …"
          sleep 420

          echo "Polling auth endpoint until new container is ready …"
          READY=false
          for i in $(seq 1 24); do
            CSRF=$(curl -sf --max-time 20 "$BASE/api/auth/csrf" \
              | sed 's/.*"csrfToken":"\([^"]*\)".*/\1/' || true)
            if [ -z "$CSRF" ]; then
              echo "$(date -u '+%H:%M:%S') UTC — no CSRF yet, waiting 30s …"
              sleep 30
              continue
            fi
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST "$BASE/api/auth/callback/credentials" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "csrfToken=${CSRF}&email=j.patel%40omnisdemo.school&password=Demo1234%21&redirect=false" \
              --max-time 60 || echo "000")
            echo "$(date -u '+%H:%M:%S') UTC — auth HTTP $HTTP"
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "302" ]; then
              echo "New container ready — auth pipeline warm"
              READY=true
              break
            fi
            sleep 30
          done
          if [ "$READY" != "true" ]; then
            echo "Timed out waiting for auth endpoint" && exit 1
          fi

          echo "Warming /login SSR page …"
          curl -sf -o /dev/null --max-time 30 "$BASE/login" || true

          echo "Warming auth paths for all 9 roles …"
          EMAILS=(
            "c.roberts%40omnisdemo.school"
            "r.morris%40omnisdemo.school"
            "admin%40omnisdemo.school"
            "a.hughes%40students.omnisdemo.school"
            "t.adeyemi%40omnisdemo.school"
            "j.taylor%40omnisdemo.school"
            "d.brooks%40omnisdemo.school"
            "l.hughes%40parents.omnisdemo.school"
          )
          for EMAIL in "${EMAILS[@]}"; do
            CSRF=$(curl -sf --max-time 20 "$BASE/api/auth/csrf" \
              | sed 's/.*"csrfToken":"\([^"]*\)".*/\1/' || true)
            if [ -n "$CSRF" ]; then
              curl -sf -o /dev/null -w " → HTTP %{http_code}\n" \
                -X POST "$BASE/api/auth/callback/credentials" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "csrfToken=${CSRF}&email=${EMAIL}&password=Demo1234%21&redirect=false" \
                --max-time 60 || true
              echo "Warmed: ${EMAIL}"
            fi
          done
          echo "All auth paths warmed — handing off to Playwright"

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 90

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://omnis.education

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

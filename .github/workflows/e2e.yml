name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      deployment_uuid: ${{ steps.trigger.outputs.deployment_uuid }}

    steps:
      - name: Trigger Coolify deploy
        id: trigger
        run: |
          RESPONSE=$(curl -s -X GET \
            "http://165.232.96.51:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}")
          echo "$RESPONSE"
          UUID=$(echo "$RESPONSE" | jq -r '.deployments[0].deployment_uuid')
          echo "deployment_uuid=$UUID" >> "$GITHUB_OUTPUT"

      - name: Wait for deploy to finish
        run: |
          UUID="${{ steps.trigger.outputs.deployment_uuid }}"
          echo "Polling deployment $UUID …"
          for i in $(seq 1 40); do
            sleep 30
            STATUS=$(curl -s \
              "http://165.232.96.51:8000/api/v1/deployments/$UUID" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              | jq -r '.status')
            echo "$(date -u '+%H:%M:%S') UTC — $STATUS"
            if [ "$STATUS" = "finished" ]; then echo "Deploy succeeded"; exit 0; fi
            if [ "$STATUS" = "failed"   ]; then echo "Deploy FAILED";    exit 1; fi
          done
          echo "Timed out waiting for deploy (20 min)" && exit 1

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 30

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://omnis.education

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

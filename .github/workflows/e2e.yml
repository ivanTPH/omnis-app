name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      deployment_uuid: ${{ steps.trigger.outputs.deployment_uuid || '' }}

    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -s -X GET \
            "http://165.232.96.51:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Wait for new container + warm auth
        # Docker build (3-stage) takes ~6-8 min. The /marketing/home 200 comes from
        # the OLD container still serving during build — checking it early gives a
        # false positive. Instead: wait 7 min for the build to complete, then poll
        # the AUTH endpoint (not just the static page) until the NEW container's
        # NextAuth + bcrypt + Prisma pipeline responds successfully. This ensures
        # the DB connection pool is pre-warmed before Playwright runs.
        run: |
          BASE=https://omnis.education
          echo "Waiting 7 minutes for Docker build + deploy + container start …"
          sleep 420
          echo "Polling auth endpoint until new container is ready …"
          for i in $(seq 1 24); do
            CSRF=$(curl -sf --max-time 15 "$BASE/api/auth/csrf" \
              | sed 's/.*"csrfToken":"\([^"]*\)".*/\1/' || true)
            if [ -z "$CSRF" ]; then
              echo "$(date -u '+%H:%M:%S') UTC — no CSRF yet, waiting 30s …"
              sleep 30
              continue
            fi
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST "$BASE/api/auth/callback/credentials" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "csrfToken=${CSRF}&email=j.patel%40omnisdemo.school&password=Demo1234%21&redirect=false" \
              --max-time 30 || echo "000")
            echo "$(date -u '+%H:%M:%S') UTC — auth HTTP $HTTP"
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "302" ]; then
              echo "New container ready — auth pipeline warm"
              exit 0
            fi
            sleep 30
          done
          echo "Timed out waiting for auth endpoint (12 min after build wait)" && exit 1

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 60

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://omnis.education

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

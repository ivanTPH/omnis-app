name: E2E Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      deployment_uuid: ${{ steps.trigger.outputs.deployment_uuid }}

    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -s -X GET \
            "http://165.232.96.51:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Wait for site to be healthy
        # Coolify's deployment tracking API only surfaces in-progress jobs —
        # completed ones vanish immediately, making UUID polling unreliable.
        # Instead: wait 2 min for the build to get underway, then poll the
        # live site every 30 s until it returns 200 (or we time out at 20 min).
        run: |
          echo "Waiting 2 minutes for Docker build to start …"
          sleep 120
          echo "Polling https://omnis.education …"
          for i in $(seq 1 36); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://omnis.education/marketing/home)
            echo "$(date -u '+%H:%M:%S') UTC — HTTP $CODE"
            if [ "$CODE" = "200" ]; then echo "Site is up"; exit 0; fi
            sleep 30
          done
          echo "Timed out — site did not return 200 within 20 min" && exit 1

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 30

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://omnis.education

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
